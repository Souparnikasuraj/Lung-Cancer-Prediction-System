<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login Page</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

    {% load static %}

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: url("{% static 'images/main.jpeg' %}") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* DARK OVERLAY */
        body::before{
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            animation: fadeIn 1s ease;
        }

        /* POPUP ANIMATION */
        @keyframes popup {
            0% {
                transform: scale(0.7) translateY(50px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* FORM CARD */
        form{
            position: relative;
            width: 420px;
            padding: 40px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            animation: popup 0.6s ease forwards;
        }

        form h3{
            text-align: center;
            color: #fff;
            font-size: 32px;
            margin-bottom: 20px;
        }

        label{
            color: #fff;
            font-size: 14px;
            margin-top: 15px;
            display: block;
        }

        input{
            width: 100%;
            height: 42px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
            padding: 0 10px;
            background: rgba(255,255,255,0.15);
            color: white;
            transition: 0.3s;
        }

        /* INPUT FOCUS EFFECT */
        input:focus{
            outline: none;
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 8px #23a2f6;
            transform: scale(1.02);
        }

        ::placeholder{
            color: #ddd;
        }

        /* BUTTON */
        button{
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #23a2f6, #1845ad);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* BUTTON HOVER */
        button:hover{
            transform: scale(1.05);
            box-shadow: 0 0 15px #23a2f6;
        }

        /* LINK */
        a{
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

        a:hover{
            text-decoration: underline;
        }

    </style>
</head>

<body>

    <form method="post">
        {% csrf_token %}

        <h3>Login Here</h3>

        <label><i class='bx bxs-user'></i> Username</label>
        <input type="text" placeholder="Enter Username" name="username">

        <label><i class='bx bxs-lock'></i> Password</label>
        <input type="password" placeholder="Password" name="pass">

        <button type="submit">Log In</button>

        <a href="{% url 'signup' %}">Create an account</a>
    </form>

</body>
</html>
