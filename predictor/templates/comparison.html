{% extends 'home.html' %} 
{% block content %}

<style>
  /* Transparent glass card (same theme as your site) */
  .feature-card {
    background: rgba(255, 255, 255, 0.07); /* transparent */
    backdrop-filter: blur(10px); /* glass effect */
    border-radius: 20px;
    padding: 30px;
    text-align: center;
    color: white;
    transition: 0.3s ease;
    height: 100%;
    border: 1px solid transparent;
  }

  /* Hover effect (same as before but enhanced) */
  .feature-card:hover {
    transform: translateY(-10px);
    border: 1px solid #00ffcc;
    box-shadow: 0 10px 25px rgba(0, 255, 204, 0.2);
  }

  h1 {
    color: #00ffcc;
    font-weight: 700;
  }
</style>

<div class="container text-center text-white mt-5">

  <h1>Model Comparison</h1>

  <div class="row mt-5 justify-content-center">

    <div class="col-md-5 m-3">
      <div class="feature-card">
        <h3>Logistic Regression</h3>
        <h2>{{ lr }}%</h2>
      </div>
    </div>

    <div class="col-md-5 m-3">
      <div class="feature-card">
        <h3>Decision Tree</h3>
        <h2>{{ dt }}%</h2>
      </div>
    </div>

    <div class="col-md-5 m-3">
      <div class="feature-card">
        <h3>Random Forest</h3>
        <h2>{{ rf }}%</h2>
      </div>
    </div>

    <div class="col-md-5 m-3">
      <div class="feature-card">
        <h3>SVM</h3>
        <h2>{{ svm }}%</h2>
      </div>
    </div>

  </div>

</div>

{% endblock %}
